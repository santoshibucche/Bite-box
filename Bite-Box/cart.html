        <tbody>
          <tr>
            <td class="item">

              </div>
            </td>

            <td>₹199</td>
            <td>
              <div class="qty-box">
              <button>-</button>
              <span>1</span>
              <button>+</button>
              </div>
            </td>
            <td>₹199</td>
            <td>
              <button class="remove">❌</button>
            </td>
          </tr>
          <tr class="grand-total">
            <td colspan="3">Grand Total</td>
            <td>₹199</td>
            <td>
              <button>Proceed</button>
            </td>
          </tr>

          <tr>
            <td class="item">
              <img src="/Bite-Box/images/hotdog.jpg" alt="buger" />

            <td>₹299</td>
            <td>
              <div class="qty-box">
              <button>-</button>

          </tr>

            <td colspan="3">Grand Total</td>

            <td>
              <button>Proceed</button>
            </td>
          </tr>

          <tr>
            <td class="item">
              <img src="/Bite-Box/images/momo.jpg" alt="buger" />
              <div>
                <h4>Momos</h4>
                <p>veg steam momos</p>
              </div>

            <td>₹199</td>
            <td>
              <div class="qty-box">
              <button>-</button>
              <span>1</span>

              </div>
            </td>

            </td>
